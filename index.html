<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#f4f6f9}

.hero{
background:linear-gradient(135deg,#0d6efd,#0a58ca);
color:#fff;
text-align:center;
padding:40px;
}

#appBox{display:none;text-align:center}

.course{
background:#fff;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH -->
<style>
.auth-wrapper{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1d2b64,#f8cdda);
font-family:Arial;
}

.auth-card{
width:380px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{transform:translateY(20px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.auth-card h3{
text-align:center;
color:#fff;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
outline:none;
}

.btn-login{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4267B2;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn-login:hover{
transform:scale(1.03);
background:#365899;
}

.btn-signup{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00c896;
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:8px;
transition:0.3s;
}

.btn-signup:hover{
transform:scale(1.03);
background:#00a87a;
}

.switch{
text-align:center;
margin-top:10px;
color:#fff;
font-size:13px;
cursor:pointer;
opacity:0.8;
}

.switch:hover{
opacity:1;
}

.toggle-dark{
position:absolute;
top:15px;
right:15px;
background:#000;
color:#fff;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}
</style>

<div class="auth-wrapper">
<button class="toggle-dark" onclick="document.body.classList.toggle('dark')">🌙</button>

<div class="auth-card">

<h3>Mahmoud Technology</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn-login" onclick="login()">تسجيل دخول</button>
<button class="btn-signup" onclick="signUp()">إنشاء حساب</button>

<div class="switch">
منصة تعليمية احترافية
</div>

</div>
</div>

<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100 mb-2" onclick="signUp()">إنشاء حساب</button>
<button class="btn btn-success w-100" onclick="login()">تسجيل دخول</button>
</div>

<!-- APP -->
<div id="appBox">

<div class="hero">
<h1>Mahmoud Technology</h1>
<p>منصة تعليمية</p>
<button class="btn btn-dark" onclick="logout()">تسجيل خروج</button>
</div>

<div class="container mt-4">
<h3>📚 الكورسات</h3>

<div class="course">أساسيات البرمجة</div>
<div class="course">رياضيات</div>

</div>
</div>

<!-- FIREBASE (FIXED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ================= SIGN UP =================
window.signUp = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)
.then(()=>{
alert("تم إنشاء الحساب ✅");
})
.catch(err=>{
alert(err.message);
});
}

// ================= LOGIN =================
window.login = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then(()=>{
alert("تم تسجيل الدخول ✅");
document.getElementById("authBox").style.display="none";
document.getElementById("appBox").style.display="block";
})
.catch(err=>{
alert(err.message);
});
}

// ================= LOGOUT =================
window.logout = function(){
signOut(auth).then(()=>{
location.reload();
});
}
</script>

</body>
</html>
