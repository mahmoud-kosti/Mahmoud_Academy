<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Cairo',Arial;transition:.3s}
body.dark{background:#121212;color:#fff}

.hero{
background:linear-gradient(135deg,#0d6efd,#0a58ca);
color:#fff;padding:60px;text-align:center;border-radius:0 0 30px 30px;
}

.course-card{
background:#fff;padding:20px;border-radius:15px;
cursor:pointer;transition:.3s;border:2px solid #0d6efd;
}
.course-card:hover{transform:translateY(-5px)}

.auth-box{
max-width:400px;margin:20px auto;
}

.logout-btn{
position:fixed;top:15px;left:15px;
}
</style>
</head>

<body>

<!-- LOGOUT -->
<button class="btn btn-danger logout-btn" onclick="logout()">تسجيل خروج</button>

<!-- AUTH -->
<div class="auth-box card p-4" id="authBox">
<h4 class="mb-3">تسجيل الدخول / إنشاء حساب</h4>
<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<input type="password" id="password" class="form-control mb-2" placeholder="Password">
<input type="text" id="username" class="form-control mb-3" placeholder="Username">
<button class="btn btn-primary w-100 mb-2" onclick="signUp()">إنشاء حساب</button>
<button class="btn btn-success w-100" onclick="login()">تسجيل دخول</button>
</div>

<!-- HERO -->
<div class="hero">
<h1>Mahmoud Technology</h1>
<p>منصة تعليمية احترافية</p>
</div>

<!-- COURSES -->
<div class="container mt-5" id="courses">
<h3 class="text-center mb-4">📚 الكورسات</h3>

<div class="row g-4">
<div class="col-md-4">
<div class="course-card" onclick="openCourse('prog')">
<h5>أساليب البرمجة</h5>
<p>تعلم البرمجة من الصفر</p>
</div>
</div>

<div class="col-md-4">
<div class="course-card" onclick="openCourse('math')">
<h5>الرياضيات</h5>
<p>شرح مبسط</p>
</div>
</div>
</div>
</div>

<!-- COURSE PAGE -->
<div class="container mt-5" id="coursePage" style="display:none">
<button class="btn btn-warning mb-3" onclick="back()">رجوع</button>
<h2 id="courseTitle"></h2>
<p>محتوى الكورس يظهر هنا</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔑 بياناتك
const supabaseUrl = "YOUR_URL";
const supabaseKey = "YOUR_ANON_KEY";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// signup
async function signUp(){
const email = emailInput();
const password = passInput();
const username = userInput();

const { data, error } = await supabase.auth.signUp({ email, password });

if(error){ alert(error.message); return; }

if(data.user){
await supabase.from("profiles").insert([
{ id: data.user.id, username }
]);
}

alert("تم إنشاء الحساب");
}

// login
async function login(){
const { error } = await supabase.auth.signInWithPassword({
email: emailInput(),
password: passInput()
});

if(error){ alert(error.message); return; }

hideAuth();
alert("تم تسجيل الدخول");
}

// logout
async function logout(){
await supabase.auth.signOut();
location.reload();
}

// session check
supabase.auth.getSession().then(({ data })=>{
if(data.session){ hideAuth(); }
});

// helpers
function emailInput(){ return document.getElementById("email").value; }
function passInput(){ return document.getElementById("password").value; }
function userInput(){ return document.getElementById("username").value; }

function hideAuth(){
document.getElementById("authBox").style.display="none";
}

// 🔒 حماية الكورسات
async function openCourse(name){
const { data } = await supabase.auth.getSession();

if(!data.session){
alert("لازم تسجل دخول أولاً 🔒");
return;
}

document.getElementById("courses").style.display="none";
document.getElementById("coursePage").style.display="block";

document.getElementById("courseTitle").innerText =
name === "prog" ? "أساليب البرمجة" : "الرياضيات";
}

function back(){
document.getElementById("courses").style.display="block";
document.getElementById("coursePage").style.display="none";
}
</script>

</body>
</html>
