<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Social App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  border-bottom: 1px solid #1e293b;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transform: perspective(800px) rotateX(2deg);
  transition: 0.3s;
}

.card:hover {
  transform: perspective(800px) rotateX(0deg) scale(1.01);
}

input, button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input {
  background: #0f172a;
  color: white;
  border: 1px solid #1e293b;
  text-align: center;
  font-size: 18px;
  letter-spacing: 5px;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

.switch {
  color: #60a5fa;
  cursor: pointer;
  margin-top: 10px;
  text-align: center;
}

.post {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  position: relative;
}

.email {
  font-size: 12px;
  color: #94a3b8;
}

.content {
  margin: 8px 0;
  word-wrap: break-word;
}

.actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.actions button {
  width: auto;
  padding: 6px 12px;
  font-size: 12px;
  margin: 0;
}

.btn-edit {
  background: #f59e0b;
}

.btn-delete {
  background: #ef4444;
}

.logout {
  background: #ef4444;
  margin-top: 10px;
}

.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 13px;
  opacity: 0.8;
}

.whatsapp {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.whatsapp a {
  background: #25D366;
  padding: 10px 15px;
  border-radius: 50px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.3s;
}

.whatsapp a:hover {
  transform: scale(1.05);
}

.notice {
  background: #1e3a8a;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  text-align: center;
  font-size: 14px;
}

.otp-input {
  letter-spacing: 15px;
  font-size: 24px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
🔥  HOota O Black  🔥
</div>

<div class="container">

<!-- 🔐 AUTH -->
<div id="authBox" class="card">

  <div id="loginBox">
    <h3>تسجيل الدخول</h3>
    <input type="email" id="logEmail" placeholder="Email">
    <input type="password" id="logPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="showRegister()">إنشاء حساب جديد</div>
  </div>

  <div id="registerBox" style="display:none">
    <h3>إنشاء حساب</h3>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPass" placeholder="Password">
    <input type="password" id="regPass2" placeholder="Confirm Password">
    <button onclick="register()">Register</button>
    <div class="switch" onclick="showLogin()">رجوع لتسجيل الدخول</div>
  </div>

  <div id="otpBox" style="display:none">
    <h3>أدخل كود التحقق</h3>
    <div class="notice">
      رسلنا كود من 6 أرقام على <br><span id="otpEmail"></span>
    </div>
    <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6">
    <button onclick="verifyOtp()">تأكيد الكود</button>
    <button onclick="resendOtp()" style="background:#6b7280;">إعادة إرسال الكود</button>
    <div class="switch" onclick="showLogin()">رجوع لتسجيل الدخول</div>
  </div>

</div>

<!-- 🟢 POSTS -->
<div id="appBox" style="display:none">

  <h3>اكتب بوست</h3>
  <input type="text" id="postInput" placeholder="اكتب هنا">
  <button onclick="addPost()">نشر</button>

  <button class="logout" onclick="logout()">تسجيل خروج</button>

  <div id="postsList"></div>

  <div class="whatsapp">
    <a href="https://wa.me/249900623733" target="_blank">
      💬 تواصل واتساب
    </a>
  </div>

  <div class="footer">
    جميع الحقوق محفوظة لدى HOota O Black ©
  </div>

</div>

</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://ymepvanoqgvntcuacnhm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZXB2YW5vcWd2bnRjdWFjbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzE2MDMsImV4cCI6MjA5MTg0NzYwM30.T8vXyv_DsSGoas8kLpNMI3ULEA8keB2pTseHnGUlZyw";

const supabase = createClient(supabaseUrl, supabaseKey);

/* UI */
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");

/* TOGGLE FORM */
window.showLogin = function(){
  loginBox.style.display = "block";
  registerBox.style.display = "none";
  otpBox.style.display = "none";
}

window.showRegister = function(){
  loginBox.style.display = "none";
  registerBox.style.display = "block";
  otpBox.style.display = "none";
}

window.showOtp = function(email){
  loginBox.style.display = "none";
  registerBox.style.display = "none";
  otpBox.style.display = "block";
  document.getElementById("otpEmail").textContent = email;
}

/* CHECK USER */
async function checkUser(){
  const { data: { user } } = await supabase.auth.getUser();

  if(user && user.email_confirmed_at){
    authBox.style.display = "none";
    appBox.style.display = "block";
    loadPosts();
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
    showLogin()
  }
}
checkUser();

/* REGISTER */
window.register = async function(){
  const email = regEmail.value.trim();
  const pass = regPass.value;
  const pass2 = regPass2.value;

  if(!email || !pass){
    alert("املأ كل الحقول");
    return;
  }

  if(pass !== pass2){
    alert("كلمات المرور غير متطابقة");
    return;
  }

  if(pass.length < 6){
    alert("كلمة المرور لازم 6 أحرف على الأقل");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password: pass
  });

  if(error) {
    alert(error.message);
  } else {
    showOtp(email);
  }
}

/* VERIFY OTP */
window.verifyOtp = async function(){
  const email = document.getElementById("otpEmail").textContent;
  const token = otpCode.value.trim();

  if(token.length !== 6){
    alert("الكود لازم 6 أرقام");
    return;
  }

  const { data, error } = await supabase.auth.verifyOtp({
    email,
    token,
    type: 'signup'
  });

  if(error) {
    alert('كود غلط أو منتهي: ' + error.message);
  } else {
    alert('تم تأكيد حسابك بنجاح');
    checkUser();
  }
}

/* RESEND OTP */
window.resendOtp = async function(){
  const email = document.getElementById("otpEmail").textContent;
  
  const { error } = await supabase.auth.resend({
    type: 'signup',
    email: email
  });
  
  if(error) alert(error.message);
  else alert('رسلنا الكود تاني، شيك إيميلك');
}

/* LOGIN */
window.login = async function(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: logEmail.value,
    password: logPass.value
  });

  if(error) {
    alert(error.message);
  } else if(data.user && !data.user.email_confirmed_at){
    showOtp(data.user.email);
  } else {
    checkUser();
  }
}

/* LOGOUT */
window.logout = async function(){
  await supabase.auth.signOut();
  checkUser();
}

/* ADD POST */
window.addPost = async function(){
  const content = postInput.value.trim();
  if(!content) {
    alert("اكتب حاجة أول");
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    alert("سجل دخول أولاً");
    return;
  }

  const { error } = await supabase.from("posts").insert([
    { 
      email: user.email, 
      content,
      user_id: user.id 
    }
  ]);

  if(error) {
    alert('فشل النشر: ' + error.message);
    return;
  }

  postInput.value = "";
  loadPosts();
}

/* DELETE POST */
window.deletePost = async function(postId){
  const confirmDelete = confirm('متأكد عايز تحذف البوست؟')
  if (!confirmDelete) return

  const { error } = await supabase
    .from('posts')
    .delete()
    .eq('id', postId)
  
  if (error) {
    alert('فشل الحذف: ' + error.message)
  } else {
    document.getElementById(`post-${postId}`).remove()
  }
}

/* EDIT POST */
window.editPost = async function(postId, oldContent){
  const newContent = prompt('اكتب المحتوى الجديد:', oldContent)
  if (newContent === null) return
  if (newContent === oldContent) return

  const { error } = await supabase
    .from('posts')
    .update({ content: newContent })
    .eq('id', postId)
  
  if (error) {
    alert('فشل التعديل: ' + error.message)
  } else {
    loadPosts()
  }
}

/* LOAD POSTS */
async function loadPosts(){
  const { data: { user } } = await supabase.auth.getUser();
  
  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if(error) {
    alert('خطأ في تحميل البوستات: ' + error.message)
    return;
  }

  postsList.innerHTML = "";

  data.forEach(p=>{
    const isOwner = user && user.id === p.user_id
    
    postsList.innerHTML += `
      <div class="post" id="post-${p.id}">
        <div class="email">${p.email}</div>
        <div class="content">${p.content}</div>
        ${isOwner ? `
          <div class="actions">
            <button class="btn-edit" onclick='editPost("${p.id}", ${JSON.stringify(p.content)})'>تعديل</button>
            <button class="btn-delete" onclick="deletePost('${p.id}')">حذف</button>
          </div>
        ` : ''}
      </div>
    `;
  });
}
</script>

</body>
</html>
