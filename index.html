<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Login System</title>
</head>
<body>

<h2>إنشاء حساب</h2>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>

<h2>تسجيل دخول</h2>
<input type="email" id="logEmail" placeholder="Email">
<input type="password" id="logPass" placeholder="Password">
<button onclick="login()">Login</button>

<br><br>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ تسجيل حساب
window.register = async function () {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPass").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("تم إنشاء الحساب بنجاح");
  } catch (error) {
    alert(error.message);
  }
};

// ✅ تسجيل دخول
window.login = async function () {
  const email = document.getElementById("logEmail").value;
  const password = document.getElementById("logPass").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("تم تسجيل الدخول");
  } catch (error) {
    alert(error.message);
  }
};

// ✅ تسجيل خروج
window.logout = async function () {
  await signOut(auth);
  alert("تم تسجيل الخروج");
};

// ✅ معرفة حالة المستخدم
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("status");

  if (user) {
    status.innerText = "✅ مسجل دخول: " + user.email;
  } else {
    status.innerText = "❌ غير مسجل دخول";
  }
});
</script>

</body>
</html>
