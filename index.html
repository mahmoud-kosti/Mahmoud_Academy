<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Firebase Fixed</title>
</head>

<body>

<h2>Login Test</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- FIREBASE CDN (CORRECT FOR HTML) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ Firebase Config (FIXED)
const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.appspot.com",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ================= SIGN UP =================
window.signUp = function () {
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, pass)
.then(() => {
document.getElementById("msg").innerText = "تم إنشاء الحساب بنجاح";
})
.catch((error) => {
document.getElementById("msg").innerText = error.message;
});
};

// ================= LOGIN =================
window.login = function () {
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, pass)
.then(() => {
document.getElementById("msg").innerText = "تم تسجيل الدخول بنجاح";
})
.catch((error) => {
document.getElementById("msg").innerText = error.message;
});
};
</script>

</body>
</html>
