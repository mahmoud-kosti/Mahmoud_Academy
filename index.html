<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOota Social</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --card: rgba(20, 20, 35, 0.6);
  --card-border: rgba(255, 255, 255, 0.1);
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --input-bg: rgba(15, 23, 42, 0.8);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(at 20% 30%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
    radial-gradient(at 80% 70%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
  overflow-x: hidden;
}

.navbar {
  background: rgba(10, 10, 15, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 900;
  border-bottom: 1px solid var(--card-border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar span {
  background: linear-gradient(135deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.container {
  max-width: 500px;
  margin: 20px auto;
  padding: 0 16px 40px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  padding: 28px 24px;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}

h3 { font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; }

.input-group { margin-bottom: 16px; }

input {
  width: 100%;
  padding: 16px 20px;
  background: var(--input-bg);
  border: 2px solid transparent;
  border-radius: 16px;
  color: var(--text);
  outline: none;
  transition: 0.3s;
}

input:focus { border-color: var(--primary); transform: translateY(-2px); }

button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  border: none;
  border-radius: 16px;
  color: white;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { transform: translateY(-2px); opacity: 0.9; }
button:disabled { background: #374151; cursor: not-allowed; }

.switch, .link {
  color: var(--primary);
  cursor: pointer;
  margin-top: 16px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
}

.post {
  background: var(--card);
  padding: 18px;
  margin-top: 16px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
}

.message { padding: 14px; border-radius: 12px; margin: 12px 0; text-align: center; font-size: 14px; }
.error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: #ff8a8a; }
.success { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); color: #a7f3d0; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  z-index: 1000;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="toastContainer"></div>

<div class="navbar">
  <span>🔥 HOota Social 🔥</span>
</div>

<div class="container">

  <div id="authBox" class="card">
    <div id="loginBox">
      <h3>تسجيل الدخول</h3>
      <div class="input-group"><input type="email" id="logEmail" placeholder="الإيميل"></div>
      <div class="input-group"><input type="password" id="logPass" placeholder="كلمة المرور"></div>
      <button onclick="login()" id="loginBtn">دخول</button>
      <div id="loginMsg"></div>
      <div class="link" onclick="showForgotPassword()">نسيت كلمة المرور؟</div>
      <div class="switch" onclick="showRegister()">إنشاء حساب جديد</div>
    </div>

    <div id="registerBox" style="display:none">
      <h3>إنشاء حساب</h3>
      <div class="input-group"><input type="email" id="regEmail" placeholder="الإيميل"></div>
      <div class="input-group"><input type="password" id="regPass" placeholder="كلمة المرور"></div>
      <div class="input-group"><input type="password" id="regPass2" placeholder="تأكيد كلمة المرور"></div>
      <button onclick="register()" id="registerBtn">إنشاء الحساب</button>
      <div id="registerMsg"></div>
      <div class="switch" onclick="showLogin()">عندي حساب</div>
    </div>

    <div id="checkEmailBox" style="display:none">
      <h3>راجع إيميلك</h3>
      <div class="message success">أرسلنا رابط التحقق إلى <b id="checkEmailText"></b></div>
      <button onclick="resendEmail()" id="resendBtn">إعادة إرسال الرابط</button>
      <div class="switch" onclick="showLogin()">رجوع</div>
    </div>

    <div id="forgotBox" style="display:none">
      <h3>استعادة الحساب</h3>
      <div class="input-group"><input type="email" id="forgotEmail" placeholder="أدخل بريدك الإلكتروني"></div>
      <button onclick="forgotPassword()" id="forgotBtn">إرسال رابط التعيين</button>
      <div id="forgotMsg"></div>
      <div class="switch" onclick="showLogin()">رجوع</div>
    </div>

    <div id="resetBox" style="display:none">
      <h3>تعيين كلمة مرور جديدة</h3>
      <div class="input-group"><input type="password" id="newPass" placeholder="كلمة المرور الجديدة"></div>
      <div class="input-group"><input type="password" id="newPass2" placeholder="تأكيد كلمة المرور"></div>
      <button onclick="resetPassword()" id="resetBtn">حفظ كلمة المرور</button>
      <div id="resetMsg"></div>
    </div>
  </div>

  <div id="appBox" style="display:none">
    <div class="card">
      <h3>اكتب بوست</h3>
      <input type="text" id="postInput" placeholder="شنو في بالك؟" style="margin-bottom:10px">
      <button onclick="addPost()">نشر</button>
    </div>
    <div id="postsList"></div>
    <button onclick="logout()" style="background:var(--danger); margin-top:20px">تسجيل خروج</button>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://ymepvanoqgvntcuacnhm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZXB2YW5vcWd2bnRjdWFjbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzE2MDMsImV4cCI6MjA5MTg0NzYwM30.T8vXyv_DsSGoas8kLpNMI3ULEA8keB2pTseHnGUlZyw";
const supabase = createClient(supabaseUrl, supabaseKey);

// UI Elements
const boxes = ['loginBox', 'registerBox', 'checkEmailBox', 'forgotBox', 'resetBox'];

window.showBox = (boxId) => {
  boxes.forEach(id => document.getElementById(id).style.display = (id === boxId ? 'block' : 'none'));
  clearMessages();
}

window.showLogin = () => showBox('loginBox');
window.showRegister = () => showBox('registerBox');
window.showForgotPassword = () => showBox('forgotBox');
window.showResetPassword = () => showBox('resetBox');

function clearMessages() {
  ['loginMsg', 'registerMsg', 'forgotMsg', 'resetMsg'].forEach(id => document.getElementById(id).innerHTML = "");
}

function showMessage(id, text, isError = true) {
  document.getElementById(id).innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
}

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = text;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// --- المصحح: منطق مراقبة حالة المستخدم ---
supabase.auth.onAuthStateChange(async (event, session) => {
  console.log("Auth Event:", event);

  // إذا كان المستخدم يضغط على رابط استعادة كلمة السر من الإيميل
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";
    showResetPassword();
    return;
  }

  // إذا تم تسجيل الدخول بنجاح
  if (session) {
    // نتأكد أننا لسنا في حالة استعادة كلمة مرور حالياً
    if (document.getElementById("resetBox").style.display !== 'block') {
      document.getElementById("authBox").style.display = "none";
      document.getElementById("appBox").style.display = "block";
      loadPosts();
    }
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("appBox").style.display = "none";
    showLogin();
  }
});

// FUNCTIONS
window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: logEmail.value,
    password: logPass.value
  });
  if(error) showMessage("loginMsg", error.message);
};

window.register = async () => {
  if(regPass.value !== regPass2.value) return showMessage("registerMsg", "كلمات المرور غير متطابقة");
  const { error } = await supabase.auth.signUp({
    email: regEmail.value,
    password: regPass.value,
    options: { emailRedirectTo: window.location.href }
  });
  if(error) showMessage("registerMsg", error.message);
  else {
    document.getElementById("checkEmailText").innerText = regEmail.value;
    showBox('checkEmailBox');
  }
};

window.forgotPassword = async () => {
  const { error } = await supabase.auth.resetPasswordForEmail(forgotEmail.value, {
    redirectTo: window.location.href,
  });
  if(error) showMessage("forgotMsg", error.message);
  else showMessage("forgotMsg", "تم إرسال الرابط للإيميل", false);
};

window.resetPassword = async () => {
  if(newPass.value !== newPass2.value) return showMessage("resetMsg", "غير متطابقة");
  const { error } = await supabase.auth.updateUser({ password: newPass.value });
  if(error) showMessage("resetMsg", error.message);
  else {
    showToast("تم تغيير كلمة المرور بنجاح");
    await supabase.auth.signOut();
    showLogin();
  }
};

window.logout = () => supabase.auth.signOut();

window.addPost = async () => {
  const { data: { user } } = await supabase.auth.getUser();
  const { error } = await supabase.from("posts").insert([{ email: user.email, content: postInput.value, user_id: user.id }]);
  if(!error) { postInput.value = ""; loadPosts(); showToast("تم النشر"); }
};

async function loadPosts() {
  const { data } = await supabase.from("posts").select("*").order("created_at", { ascending: false });
  postsList.innerHTML = data ? data.map(p => `<div class="post"><b>${p.email}</b><p>${p.content}</p></div>`).join('') : '';
}
</script>
</body>
</html>
