<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:Arial;transition:.3s}
body.dark{background:#121212;color:#fff}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div class="container mt-4" id="authBox">
  <div class="card p-4">
    <h4>تسجيل الدخول / إنشاء حساب</h4>

    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
    <input type="text" id="username" class="form-control mb-3" placeholder="Username">

    <button class="btn btn-primary w-100 mb-2" onclick="signUp()">إنشاء حساب</button>
    <button class="btn btn-success w-100" onclick="login()">تسجيل دخول</button>
  </div>
</div>

<div class="container text-center mt-5">
<h1>Mahmoud Technology</h1>
<p>منصة تعليمية</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "sb_publishable_MQI8w5gb1HkDcTHptUuk0g_3owfKF2I";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjY3lmdHF3c3V4cG1qa3Jrd2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjcwOTcsImV4cCI6MjA5MTg0MzA5N30.uyFgGt9ubmWrR6CAkQwTw7BUOjmROoyrGPzwB3bNHyA";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// signup
async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
    return;
  }

  if(data.user){
    await supabase.from("profiles").insert([
      { id: data.user.id, username: username }
    ]);
  }

  alert("تم إنشاء الحساب ✅");
}

// login
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("authBox").style.display="none";
  alert("تم تسجيل الدخول ✅");
}

// check session
supabase.auth.getSession().then(({ data }) => {
  if(data.session){
    document.getElementById("authBox").style.display="none";
  }
});
</script>

</body>
</html>
