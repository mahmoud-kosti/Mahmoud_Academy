<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOota Social</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --card: rgba(20, 20, 35, 0.6);
  --card-border: rgba(255, 255, 255, 0.1);
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --input-bg: rgba(15, 23, 42, 0.8);
}

* {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(at 20% 30%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
    radial-gradient(at 80% 70%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
  overflow-x: hidden;
}

.navbar {
  background: rgba(10, 10, 15, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 20px;
  border-bottom: 1px solid var(--card-border);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar-brand {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.nav-btn {
  width: auto;
  padding: 10px 16px;
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--card-border);
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--primary);
  cursor: pointer;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 16px 40px;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
}

.sidebar {
  position: sticky;
  top: 90px;
  height: fit-content;
}

.main-feed {
  min-height: 400px;
}

@media (max-width: 968px) {
 .container {grid-template-columns: 1fr;}
 .sidebar {display: none;}
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  padding: 24px;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  animation: slideUp 0.5s ease-out;
  margin-bottom: 20px;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.profile-card {
  text-align: center;
}

.profile-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--primary);
  margin-bottom: 12px;
}

.profile-username {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.profile-email {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.profile-bio {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

input, textarea {
  width: 100%;
  padding: 16px 20px;
  background: var(--input-bg);
  border: 2px solid transparent;
  border-radius: 16px;
  color: var(--text);
  font-size: 16px;
  font-family: 'Cairo', sans-serif;
  transition: all 0.3s ease;
  outline: none;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  border-color: var(--primary);
  background: rgba(15, 23, 42, 1);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
}

button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  border: none;
  border-radius: 16px;
  color: white;
  font-size: 17px;
  font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
}

button:disabled {
  background: #374151;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: var(--card);
  border: 1px solid var(--card-border);
}

.post {
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  padding: 18px;
  margin-bottom: 16px;
  border-radius: 20px;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.post-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.post-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}

.post-user {
  flex: 1;
}

.post-username {
  font-weight: 700;
  font-size: 15px;
}

.post-time {
  font-size: 12px;
  color: var(--text-muted);
}

.post-content {
  margin: 12px 0;
  font-size: 16px;
  line-height: 1.6;
  word-wrap: break-word;
}

.post-image {
  width: 100%;
  border-radius: 16px;
  margin: 12px 0;
  max-height: 500px;
  object-fit: cover;
}

.reactions-bar {
  display: flex;
  gap: 8px;
  padding: 12px 0;
  border-top: 1px solid var(--card-border);
  border-bottom: 1px solid var(--card-border);
  margin: 12px 0;
}

.reaction-btn {
  flex: 1;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}

.reaction-btn:hover {
  background: rgba(99, 102, 241, 0.1);
  border-color: var(--primary);
  transform: scale(1.05);
}

.reaction-btn.active {
  background: rgba(99, 102, 241, 0.2);
  border-color: var(--primary);
}

.reaction-count {
  font-size: 13px;
  font-weight: 700;
}

.comments-section {
  margin-top: 12px;
}

.comment {
  background: rgba(0, 0, 0, 0.2);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 8px;
  display: flex;
  gap: 10px;
  align-items: start;
}

.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

.comment-content {
  flex: 1;
}

.comment-user {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
}

.comment-text {
  font-size: 14px;
  line-height: 1.5;
}

.comment-emoji {
  font-size: 18px;
  margin-left: 8px;
}

.comment-input-group {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.comment-input-group input {
  margin: 0;
}

.emoji-picker {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.emoji-option {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  background: var(--card);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.emoji-option:hover,.emoji-option.selected {
  border-color: var(--primary);
  background: rgba(99, 102, 241, 0.2);
  transform: scale(1.1);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  padding: 30px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.close-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--danger);
  padding: 0;
  font-size: 20px;
}

.chat-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-item {
  background: var(--card);
  border: 1px solid var(--card-border);
  padding: 16px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.3s;
}

.chat-item:hover {
  background: rgba(99, 102, 241, 0.1);
  transform: translateX(-4px);
}

.messages-container {
  max-height: 400px;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.message-bubble {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 16px;
  word-wrap: break-word;
}

.message-sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  border-bottom-right-radius: 4px;
}

.message-received {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-bottom-left-radius: 4px;
}

.message-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.message-actions button {
  width: auto;
  padding: 4px 8px;
  font-size: 11px;
  background: rgba(255, 255, 255, 0.1);
}

.file-input-label {
  display: inline-block;
  padding: 12px 20px;
  background: var(--card);
  border: 2px dashed var(--card-border);
  border-radius: 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
  margin-bottom: 12px;
}

.file-input-label:hover {
  border-color: var(--primary);
  background: rgba(99, 102, 241, 0.1);
}

input[type="file"] {
  display: none;
}

.image-preview {
  width: 100%;
  border-radius: 16px;
  margin: 12px 0;
  max-height: 300px;
  object-fit: cover;
}

.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(16, 185, 129, 0.95);
  backdrop-filter: blur(10px);
  padding: 14px 24px;
  border-radius: 50px;
  z-index: 9999;
  font-weight: 700;
  box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
  animation: toastIn 0.4s ease-out;
}

@keyframes toastIn {
  from { top: -100px; opacity: 0; }
  to { top: 80px; opacity: 1; }
}

.hidden {display: none;}

@media (max-width: 480px) {
.container { padding: 0 12px 30px; }
.card { padding: 20px; }
}
</style>
</head>

<body>

<div id="toastContainer"></div>

<div class="navbar">
  <div class="navbar-brand">🔥 HOota Social</div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openMessages()" id="messagesBtn" style="display:none">💬</button>
    <button class="nav-btn" onclick="openProfile()" id="profileBtn" style="display:none">👤</button>
    <img id="navAvatar" class="avatar hidden" onclick="openProfile()">
    <button class="nav-btn" onclick="logout()" id="logoutBtn" style="display:none">خروج</button>
  </div>
</div>

<!-- AUTH -->
<div id="authBox" class="container" style="max-width:500px;margin:40px auto;">
  <div class="card">
    <div id="loginBox">
      <h3 style="text-align:center">تسجيل الدخول</h3>
      <input type="email" id="logEmail" placeholder="الإيميل">
      <input type="password" id="logPass" placeholder="كلمة المرور">
      <button onclick="login()">دخول</button>
      <p style="text-align:center;margin-top:16px;color:var(--primary);cursor:pointer" onclick="showRegister()">إنشاء حساب جديد</p>
    </div>

    <div id="registerBox" style="display:none">
      <h3 style="text-align:center">إنشاء حساب</h3>
      <input type="email" id="regEmail" placeholder="الإيميل">
      <input type="password" id="regPass" placeholder="كلمة المرور">
      <input type="password" id="regPass2" placeholder="تأكيد كلمة المرور">
      <button onclick="register()">إنشاء الحساب</button>
      <p style="text-align:center;margin-top:16px;color:var(--primary);cursor:pointer" onclick="showLogin()">عندي حساب</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appBox" style="display:none">
  <div class="container">

    <!-- SIDEBAR PROFILE -->
    <div class="sidebar">
      <div class="card profile-card" id="profileCard">
        <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff">
        <div class="profile-username" id="profileUsername">مستخدم</div>
        <div class="profile-email" id="profileEmail">email@example.com</div>
        <div class="profile-bio" id="profileBio">مرحباً بك في HOota Social</div>
        <button class="btn-secondary" onclick="openEditProfile()" style="margin-top:12px">تعديل البروفايل</button>
      </div>
    </div>

    <!-- MAIN FEED -->
    <div class="main-feed">
      <div class="card">
        <h3>اكتب بوست</h3>
        <textarea id="postInput" placeholder="شنو في بالك؟" rows="3"></textarea>
        <label class="file-input-label">
          📷 إضافة صورة
          <input type="file" id="postImage" accept="image/*" onchange="previewPostImage(event)">
        </label>
        <img id="postImagePreview" class="image-preview" style="display:none">
        <button onclick="addPost()">نشر</button>
      </div>

      <div id="postsList"></div>
    </div>

  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>الملف الشخصي</h3>
      <button class="close-btn" onclick="closeProfileModal()">✕</button>
    </div>
    <div id="profileModalContent"></div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div id="editProfileModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>تعديل البروفايل</h3>
      <button class="close-btn" onclick="closeEditProfile()">✕</button>
    </div>
    <input type="text" id="editUsername" placeholder="اسم المستخدم">
    <textarea id="editBio" placeholder="النبذة التعريفية" rows="3"></textarea>
    <label class="file-input-label">
      📷 تغيير الصورة
      <input type="file" id="editAvatar" accept="image/*" onchange="previewAvatar(event)">
    </label>
    <img id="avatarPreview" class="image-preview" style="display:none">
    <button onclick="saveProfile()">حفظ التغييرات</button>
  </div>
</div>

<!-- MESSAGES MODAL -->
<div id="messagesModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>الرسائل</h3>
      <button class="close-btn" onclick="closeMessages()">✕</button>
    </div>
    <div id="chatList" class="chat-list"></div>
    <div id="chatView" style="display:none">
      <div class="messages-container" id="messagesContainer"></div>
      <div class="comment-input-group">
        <input type="text" id="messageInput" placeholder="اكتب رسالة...">
        <button onclick="sendMessage()" style="width:auto;padding:12px 20px">إرسال</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://ymepvanoqgvntcuacnhm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZXB2YW5vcWd2bnRjdWFjbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzE2MDMsImV4cCI6MjA5MTg0NzYwM30.T8vXyv_DsSGoas8kLpNMI3ULEA8keB2pTseHnGUlZyw";
const supabase = createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let currentChatUser = null;
let selectedEmoji = null;

const emojis = ['👍', '❤️', '😂', '😮', '😢'];

function showToast(text){
  const container = document.getElementById("toastContainer");
  container.innerHTML = `<div class="toast">${text}</div>`;
  setTimeout(() => container.innerHTML = "", 3000);
}

window.showLogin = function(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerBox").style.display = "none";
}

window.showRegister = function(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";
}

window.register = async function(){
  const email = regEmail.value.trim();
  const pass = regPass.value;
  const pass2 = regPass2.value;

  if(!email ||!pass || pass!== pass2){
    showToast("تحقق من البيانات");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: pass
  });

  if(error) {
    showToast(error.message);
  } else {
    // إنشاء بروفايل
    await supabase.from('profiles').insert([{
      id: data.user.id,
      email: email,
      username: email.split('@')[0]
    }]);
    showToast("تم إنشاء الحساب ✓");
    initAuth();
  }
}

window.login = async function(){
  const { error } = await supabase.auth.signInWithPassword({
    email: logEmail.value,
    password: logPass.value
  });

  if(error) {
    showToast(error.message);
  } else {
    showToast("أهلاً بك ✓");
  }
}

window.logout = async function(){
  await supabase.auth.signOut();
  showToast("تم تسجيل الخروج");
}

async function initAuth(){
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;

  if(user){
    authBox.style.display = "none";
    appBox.style.display = "block";
    document.getElementById("messagesBtn").style.display = "block";
    document.getElementById("profileBtn").style.display = "block";
    document.getElementById("logoutBtn").style.display = "block";
    await loadProfile();
    await loadPosts();
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
  }
}

async function loadProfile(){
  const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
  if(data){
    document.getElementById("profileUsername").textContent = data.username || currentUser.email;
    document.getElementById("profileEmail").textContent = data.email;
    document.getElementById("profileBio").textContent = data.bio || "مرحباً بك في HOota Social";
    if(data.avatar_url){
      document.getElementById("profileAvatar").src = data.avatar_url;
      document.getElementById("navAvatar").src = data.avatar_url;
      document.getElementById("navAvatar").classList.remove("hidden");
    }
  }
}

window.openProfile = async function(userId = null){
  const targetId = userId || currentUser.id;
  const { data } = await supabase.from('profiles').select('*').eq('id', targetId).single();

  if(data){
    document.getElementById("profileModalContent").innerHTML = `
      <div class="profile-card">
        <img class="profile-avatar" src="${data.avatar_url || 'https://ui-avatars.com/api/?name=' + data.username}">
        <div class="profile-username">${data.username}</div>
        <div class="profile-email">${data.email}</div>
        <div class="profile-bio">${data.bio || ''}</div>
        ${targetId!== currentUser.id? `<button onclick="startChat('${targetId}')">💬 إرسال رسالة</button>` : ''}
      </div>
    `;
    document.getElementById("profileModal").classList.add("active");
  }
}

window.closeProfileModal = function(){
  document.getElementById("profileModal").classList.remove("active");
}

window.openEditProfile = function(){
  document.getElementById("editProfileModal").classList.add("active");
  loadProfileToEdit();
}

window.closeEditProfile = function(){
  document.getElementById("editProfileModal").classList.remove("active");
}

async function loadProfileToEdit(){
  const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
  if(data){
    document.getElementById("editUsername").value = data.username || '';
    document.getElementById("editBio").value = data.bio || '';
  }
}

window.previewAvatar = function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById("avatarPreview").src = e.target.result;
      document.getElementById("avatarPreview").style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

window.saveProfile = async function(){
  const username = document.getElementById("editUsername").value;
  const bio = document.getElementById("editBio").value;
  const fileInput = document.getElementById("editAvatar");

  let avatar_url = null;

  if(fileInput.files[0]){
    const file = fileInput.files[0];
    const fileExt = file.name.split('.').pop();
    const fileName = `${currentUser.id}.${fileExt}`;

    const { error: uploadError } = await supabase.storage
     .from('avatars')
     .upload(fileName, file, { upsert: true });

    if(!uploadError){
      const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
      avatar_url = data.publicUrl;
    }
  }

  const updateData = { username, bio };
  if(avatar_url) updateData.avatar_url = avatar_url;

  const { error } = await supabase.from('profiles').update(updateData).eq('id', currentUser.id);

  if(!error){
    showToast("تم تحديث البروفايل ✓");
    closeEditProfile();
    loadProfile();
  }
}

window.previewPostImage = function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById("postImagePreview").src = e.target.result;
      document.getElementById("postImagePreview").style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

window.addPost = async function(){
  const content = postInput.value.trim();
  const fileInput = document.getElementById("postImage");

  if(!content &&!fileInput.files[0]) {
    showToast("اكتب حاجة أو أضف صورة");
    return;
  }

  let image_url = null;

  if(fileInput.files[0]){
    const file = fileInput.files[0];
    const fileExt = file.name.split('.').pop();
    const fileName = `${Date.now()}.${fileExt}`;

    const { error: uploadError } = await supabase.storage
     .from('posts')
     .upload(fileName, file);

    if(!uploadError){
      const { data } = supabase.storage.from('posts').getPublicUrl(fileName);
      image_url = data.publicUrl;
    }
  }

  const { error } = await supabase.from("posts").insert([{
    email: currentUser.email,
    content,
    user_id: currentUser.id,
    image_url
  }]);

  if(error) {
    showToast('فشل النشر');
    return;
  }

  postInput.value = "";
  document.getElementById("postImage").value = "";
  document.getElementById("postImagePreview").style.display = "none";
  showToast("تم النشر ✓");
  loadPosts();
}
