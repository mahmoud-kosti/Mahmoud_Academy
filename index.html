<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0d6efd,#6c5ce7);
transition:0.4s;
overflow:hidden;
}

/* DARK MODE */
body.dark{
background:#0f172a;
color:#fff;
}

/* TOP BAR */
.topbar{
position:fixed;
top:15px;
left:15px;
}

.toggle{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111;
color:#fff;
}

/* LOGIN CARD */
.container{
width:360px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translate(-50%,-60%);}
to{opacity:1;transform:translate(-50%,-50%);}
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:#fff;
transition:0.4s;
}

body.dark .card{
background:rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:8px;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.login{background:#00b894;color:#fff}
.signup{background:#0984e3;color:#fff}

/* APP */
#appBox{
display:none;
text-align:center;
padding-top:80px;
color:#fff;
}

.hero{
font-size:28px;
font-weight:bold;
}

.course{
background:#fff;
color:#000;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.course:hover{
transform:translateY(-5px);
}
</style>
</head>

<body>

<!-- DARK MODE BUTTON -->
<div class="topbar">
<button class="toggle" onclick="toggleTheme()">🌙 الوضع</button>
</div>

<!-- LOGIN -->
<div id="authBox" class="container">
<div class="card">

<h2 style="text-align:center;">Mahmoud Technology</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">تسجيل دخول</button>
<button class="signup" onclick="signUp()">إنشاء حساب</button>

</div>
</div>

<!-- APP -->
<div id="appBox">

<div class="hero">
Mahmoud Technology<br>
<button onclick="logout()" style="margin-top:10px;background:red;color:#fff;border:none;padding:10px 20px;border-radius:10px;">
تسجيل خروج
</button>
</div>

<div>
<div class="course">📚 أساسيات البرمجة</div>
<div class="course">🧮 الرياضيات</div>
<div class="course">💻 الحاسوب</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
document.getElementById("authBox").style.display="none";
document.getElementById("appBox").style.display="block";
})
.catch(e=>{
alert("خطأ في تسجيل الدخول");
});
}

/* SIGNUP */
window.signUp = function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)
.then(()=>{
alert("تم إنشاء الحساب بنجاح");
})
.catch(e=>{
alert("خطأ في إنشاء الحساب");
});
}

/* LOGOUT */
window.logout = function(){
signOut(auth).then(()=>location.reload());
}

/* DARK MODE */
window.toggleTheme = function(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
