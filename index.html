<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0d6efd,#6c5ce7);
}

/* ================= AUTH ================= */
.auth{
width:350px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
color:#fff;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.signup{background:#0984e3;color:#fff}
.login{background:#00b894;color:#fff}

/* ================= APP ================= */
#appBox{
display:none;
background:#f4f6f9;
min-height:100vh;
}

.header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="auth" id="authBox">
<h3 style="text-align:center;">Mahmoud Academy</h3>

<input id="name" placeholder="اسم المستخدم">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="signup" onclick="signUp()">إنشاء حساب</button>
<button class="login" onclick="login()">تسجيل دخول</button>
</div>

<!-- ================= APP ================= -->
<div id="appBox">

<div class="header">
<h3 id="welcome">مرحباً 👋</h3>
<button onclick="logout()" style="background:red;color:#fff;border:none;padding:8px 15px;border-radius:10px;">
خروج
</button>
</div>

<div class="grid">
<div class="card">📚 البرمجة</div>
<div class="card">🧮 الرياضيات</div>
<div class="card">💻 الحاسوب</div>
<div class="card">🌐 الإنجليزية</div>
</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, setDoc, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= SIGN UP =================
window.signUp = async function(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let user = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",user.user.uid),{
name:name,
email:email
});

alert("تم إنشاء الحساب ✅");
}

// ================= LOGIN =================
window.login = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let user = await signInWithEmailAndPassword(auth,email,password);

let data = await getDoc(doc(db,"users",user.user.uid));

document.getElementById("authBox").style.display="none";
document.getElementById("appBox").style.display="block";

if(data.exists()){
document.getElementById("welcome").innerText =
"مرحباً " + data.data().name;
}
}

// ================= LOGOUT =================
window.logout = function(){
signOut(auth).then(()=>location.reload());
}
</script>

</body>
</html>
