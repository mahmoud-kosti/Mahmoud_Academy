<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HOota O Black</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
transition:0.4s;
}

/* DARK MODE */
body.light{
background:#f1f5f9;
color:#000;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.title{
font-size:26px;
font-weight:900;
color:#38bdf8;
letter-spacing:2px;
}

/* DARK BUTTON */
.toggle{
background:#1e293b;
border:none;
padding:8px 12px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* MAIN WRAPPER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* BIG LOGIN CARD */
.hero{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

.card{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(2,6,23,0.85);
backdrop-filter: blur(10px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
transform:scale(1);
transition:0.4s;
}

.card:hover{
transform:scale(1.03);
}

/* BIG BRAND */
.brand{
font-size:34px;
font-weight:900;
margin-bottom:10px;
color:#38bdf8;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* SWITCH */
.switch{
color:#38bdf8;
cursor:pointer;
margin-top:10px;
}

/* APP */
.app{
display:none;
}

.post{
background:#0f172a;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:0.8;
}

.whatsapp{
margin-top:10px;
text-align:center;
}

.whatsapp a{
background:#25D366;
padding:10px 15px;
border-radius:30px;
color:white;
text-decoration:none;
display:inline-block;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="title">HOota O Black</div>
<button class="toggle" onclick="toggleTheme()">🌙 الوضع</button>
</div>

<!-- LOGIN -->
<div id="auth" class="hero">

<div class="card">

<div class="brand">HOota O Black</div>

<div id="loginBox">
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button onclick="login()">تسجيل الدخول</button>
<div class="switch" onclick="toggleForm()">إنشاء حساب جديد</div>
</div>

<div id="registerBox" style="display:none">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button onclick="register()">إنشاء حساب</button>
<div class="switch" onclick="toggleForm()">رجوع</div>
</div>

</div>
</div>

<!-- APP -->
<div id="app" class="app container">

<h2>📢 النشر</h2>

<input id="postInput" placeholder="اكتب بوست...">
<button onclick="addPost()">نشر</button>

<button onclick="logout()" style="background:#ef4444;margin-top:10px">تسجيل خروج</button>

<div id="postsList"></div>

<div class="whatsapp">
<a href="https://wa.me/249900623733" target="_blank">💬 تواصل واتساب</a>
</div>

<div class="footer">
جميع الحقوق محفوظة لدى HOota O Black ©
</div>

</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://ymepvanoqgvntcuacnhm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

/* UI */
const auth=document.getElementById("auth");
const app=document.getElementById("app");

/* DARK MODE */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

/* TOGGLE FORM */
window.toggleForm=()=>{
loginBox.style.display=
loginBox.style.display==="none"?"block":"none";
registerBox.style.display=
registerBox.style.display==="none"?"block":"none";
}

/* CHECK USER */
async function check(){
const { data:{user} }=await supabase.auth.getUser();
if(user){
auth.style.display="none";
app.style.display="block";
loadPosts();
}else{
auth.style.display="flex";
app.style.display="none";
}
}
check();

/* REGISTER */
window.register=async()=>{
if(regPass.value!==regPass2.value){
alert("كلمات المرور غير متطابقة");
return;
}

await supabase.auth.signUp({
email:regEmail.value,
password:regPass.value
});
}

/* LOGIN */
window.login=async()=>{
await supabase.auth.signInWithPassword({
email:logEmail.value,
password:logPass.value
});
check();
}

/* LOGOUT */
window.logout=async()=>{
await supabase.auth.signOut();
check();
}

/* POST */
window.addPost=async()=>{
const { data:{user} }=await supabase.auth.getUser();
await supabase.from("posts").insert([
{ email:user.email, content:postInput.value }
]);
postInput.value="";
loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){
const { data }=await supabase.from("posts").select("*");
postsList.innerHTML="";
data.forEach(p=>{
postsList.innerHTML+=`
<div class="post">
<b>${p.email}</b><br>${p.content}
</div>`;
});
}
</script>

</body>
</html>
