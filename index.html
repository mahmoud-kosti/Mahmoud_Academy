<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Instagram Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.navbar{
padding:15px;
text-align:center;
background:#020617;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-top:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input,button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
}

button{
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.post{
background:#0b1220;
padding:12px;
border-radius:12px;
margin-top:10px;
border:1px solid #1e293b;
}

a{
color:#60a5fa;
text-decoration:none;
}

.small{
font-size:12px;
color:#94a3b8;
}

hr{
border:1px solid #1e293b;
margin:20px 0;
}
</style>
</head>

<body>

<div class="navbar">🔥 Instagram Pro</div>

<div class="container">

<div class="card">

<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>

<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

</div>

<hr>

<div class="card">

<h3>Create Post</h3>
<input id="postText" placeholder="What's on your mind?">
<button onclick="addPost()">Post</button>

</div>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
doc,
updateDoc,
arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */

window.register = async function(){
try{
await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
alert("Account Created");
}catch(e){
alert(e.message);
}
};

/* ================= LOGIN ================= */

window.login = async function(){
try{
const res = await signInWithEmailAndPassword(auth, logEmail.value, logPass.value);

/* 🚀 بعد الدخول روح للبروفايل مباشرة */
window.location.href = "profile.html?uid=" + res.user.uid;

}catch(e){
alert(e.message);
}
};

/* ================= LOGOUT ================= */

window.logout = async function(){
await signOut(auth);
};

/* ================= AUTH ================= */

onAuthStateChanged(auth,(user)=>{

if(user){
status.innerHTML = `
✅ ${user.email}
<br>
<a href="profile.html?uid=${user.uid}">Go to Profile</a>
`;
}else{
status.innerHTML = "❌ Not logged in";
}

loadFeed();

});

/* ================= POST ================= */

window.addPost = async function(){

const user = auth.currentUser;
if(!user) return alert("Login first");

await addDoc(collection(db,"posts"),{
userId:user.uid,
email:user.email,
content:postText.value,
likes:[],
createdAt:Date.now()
});

postText.value="";
loadFeed();

};

/* ================= FEED ================= */

async function loadFeed(){

const q = query(collection(db,"posts"),orderBy("createdAt","desc"));
const snap = await getDocs(q);

feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

feed.innerHTML+=`
<div class="post">

<div class="small">
<a href="profile.html?uid=${p.userId}">${p.email}</a>
</div>

<p>${p.content}</p>

<button onclick="likePost('${d.id}')">❤️ Like (${p.likes?.length||0})</button>

</div>
`;

});

}

/* ================= LIKE ================= */

window.likePost = async function(id){

const ref = doc(db,"posts",id);

await updateDoc(ref,{
likes: arrayUnion(auth.currentUser.uid)
});

loadFeed();

};

</script>

</body>
</html>
